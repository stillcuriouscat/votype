[pytest]
# Test directory
testpaths = tests

# Default options
addopts = -v --tb=short

# Marker definitions
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end tests
    race: marks tests as race condition tests
    real_model: marks tests that require real ASR model

# Timeout setting (requires pytest-timeout plugin)
timeout = 60

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
